<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCT — Marquette County</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --forest: #2F4B3C;
    --forest-dark: #1F3428;
    --cream: #F6F2EA;
    --charcoal: #2A2A28;
    --muted: #7C7A70;
    --border: #E0DACB;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--charcoal);
  }
  #app {
    display: flex;
    height: 100%;
  }
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  #sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    margin: 0 0 4px;
    font-size: 17px;
    font-weight: 600;
    color: var(--forest-dark);
  }
  #sidebar-header p {
    margin: 0;
    font-size: 12.5px;
    color: var(--muted);
  }
  #points-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
  #points-toggle input {
    accent-color: var(--forest);
  }
  #search {
    margin: 12px 18px 0;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
  }
  #search:focus {
    outline: none;
    border-color: var(--forest);
  }
  #segment-list {
    list-style: none;
    margin: 0;
    padding: 10px 8px 20px;
    overflow-y: auto;
    flex: 1;
  }
  #segment-list li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  #segment-list li:hover {
    background: #ECE5D4;
  }
  #segment-list input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--forest);
    flex-shrink: 0;
  }
  .seg-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .seg-label {
    font-size: 13.5px;
    line-height: 1.4;
  }
  .seg-doc-link {
    font-size: 11.5px;
    color: var(--forest);
    text-decoration: none;
  }
  .seg-doc-link:hover {
    text-decoration: underline;
  }
  #map {
    flex: 1;
    height: 100%;
  }
  .leaflet-popup-content {
    font-size: 13.5px;
  }
  .leaflet-popup-content a {
    color: var(--forest);
    font-weight: 600;
  }
  #empty-state {
    padding: 20px 18px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>NCT — Marquette County</h1>
      <p id="segment-count">Loading segments…</p>
      <label id="points-toggle">
        <input type="checkbox" id="show-points" checked />
        Show trailheads &amp; parking
      </label>
    </div>
    <input id="search" type="text" placeholder="Filter segments…" />
    <ul id="segment-list"></ul>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const COLORS = ["#B5541D", "#2A6F6D", "#C68A1D", "#6A4C6E", "#3E5C76", "#4B7A3E"];

  const map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const listEl = document.getElementById('segment-list');
  const countEl = document.getElementById('segment-count');
  const searchEl = document.getElementById('search');
  const showPointsEl = document.getElementById('show-points');

  const segments = []; // { name, doc, lineLayer, pointLayer, checkbox, listItem }
  const allBounds = L.latLngBounds([]);

  function popupHtml(name, doc) {
    return `<strong>${name}</strong><br><a href="${doc}" target="_blank" rel="noopener">View trail notes ↗</a>`;
  }

  function pointPopupHtml(name) {
    return `<strong>${name}</strong>`;
  }

  function buildListItem(name, doc, color, seg) {
    const li = document.createElement('li');

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = true;
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) {
        seg.lineLayer.addTo(map);
        if (showPointsEl.checked) seg.pointLayer.addTo(map);
      } else {
        map.removeLayer(seg.lineLayer);
        map.removeLayer(seg.pointLayer);
      }
    });

    const swatch = document.createElement('span');
    swatch.className = 'seg-swatch';
    swatch.style.background = color;

    const labelWrap = document.createElement('div');
    labelWrap.className = 'seg-label';
    labelWrap.innerHTML = `${name}<br><a class="seg-doc-link" href="${doc}" target="_blank" rel="noopener">Trail notes ↗</a>`;

    li.appendChild(checkbox);
    li.appendChild(swatch);
    li.appendChild(labelWrap);

    li.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'A') return;
      map.fitBounds(seg.lineLayer.getBounds(), { maxZoom: 14 });
      seg.lineLayer.eachLayer(l => l.openPopup());
    });

    listEl.appendChild(li);
    return { li, checkbox };
  }

  function pointMarker(feature, latlng, color) {
    return L.circleMarker(latlng, {
      radius: 5,
      color: '#3A3A36',
      weight: 1,
      fillColor: '#F6F2EA',
      fillOpacity: 1
    });
  }

  async function loadSegments() {
    let files;
    try {
      files = await fetch('segments.json').then(r => r.json());
    } catch (err) {
      countEl.textContent = 'Could not load segments.json';
      return;
    }

    let colorIndex = 0;

    for (const file of files) {
      try {
        const data = await fetch(file).then(r => r.json());
        const color = COLORS[colorIndex % COLORS.length];
        colorIndex++;

        const lineFeatures = data.features.filter(f => f.properties && f.properties.kind !== 'point');
        const pointFeatures = data.features.filter(f => f.properties && f.properties.kind === 'point');

        const lineData = { type: 'FeatureCollection', features: lineFeatures };
        const pointData = { type: 'FeatureCollection', features: pointFeatures };

        const lineProps = (lineFeatures[0] && lineFeatures[0].properties) || {};
        const name = lineProps.name || file;
        const doc = lineProps.doc || '#';

        const lineLayer = L.geoJSON(lineData, {
          style: { color: color, weight: 4, opacity: 0.85 },
          onEachFeature: (feature, lyr) => {
            lyr.bindPopup(popupHtml(name, doc));
          }
        }).addTo(map);

        const pointLayer = L.geoJSON(pointData, {
          pointToLayer: (feature, latlng) => pointMarker(feature, latlng, color),
          onEachFeature: (feature, lyr) => {
            lyr.bindPopup(pointPopupHtml(feature.properties.name));
          }
        });
        if (showPointsEl.checked) pointLayer.addTo(map);

        allBounds.extend(lineLayer.getBounds());

        const seg = { name, doc, lineLayer, pointLayer };
        const { li, checkbox } = buildListItem(name, doc, color, seg);
        seg.listItem = li;
        seg.checkbox = checkbox;
        segments.push(seg);
      } catch (err) {
        console.error('Failed to load', file, err);
      }
    }

    countEl.textContent = segments.length + ' segment' + (segments.length === 1 ? '' : 's') + ' loaded';

    if (allBounds.isValid()) {
      map.fitBounds(allBounds, { padding: [30, 30] });
    } else {
      map.setView([46.54, -87.40], 9);
    }
  }

  searchEl.addEventListener('input', () => {
    const q = searchEl.value.toLowerCase();
    segments.forEach(seg => {
      const match = seg.name.toLowerCase().includes(q);
      seg.listItem.style.display = match ? 'flex' : 'none';
    });
  });

  showPointsEl.addEventListener('change', () => {
    segments.forEach(seg => {
      if (!seg.checkbox.checked) return; // segment itself is hidden, leave it alone
      if (showPointsEl.checked) {
        seg.pointLayer.addTo(map);
      } else {
        map.removeLayer(seg.pointLayer);
      }
    });
  });

  loadSegments();
</script>
</body>
</html>
